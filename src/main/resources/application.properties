# Server Port Config
server.port=${PORT:8080}

# Static Resources Mapping
spring.web.resources.static-locations=classpath:/static/

# Custom Firebase Config Settings
firebase.credentials.path=${FIREBASE_CREDENTIALS_PATH:classpath:serviceAccountKey.json}
firebase.credentials.json=${FIREBASE_CREDENTIALS:}
allowed.origins=${ALLOWED_ORIGINS:http://localhost:8080,http://127.0.0.1:8080}

# Multipart Upload Constraints (Taha Jaffri Rule 8)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Console Logging Format & Levels (Taha Jaffri Rule 9)
logging.level.com.hemoconnect=INFO
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
